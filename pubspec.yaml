name: eparkmo
description: E-Park Mo — Smart Parking System | Thesis Project 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#14C1C7"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  web:
    generate: true
    image_path: "assets/images/app_logo.png"
    favicon_path: "assets/images/app_logo.png"

flutter_native_splash:
  color: "#14C1C7"
  image: "assets/images/app_logo.png"
  android_12:
    image: "assets/images/app_logo.png"
    color: "#14C1C7"
  web: false
